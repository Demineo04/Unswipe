# Basic AndroidX configuration
android.useAndroidX=true
android.enableJetifier=true

# Optional: Configure Gradle daemon memory (adjust if needed)
# Increase Gradle Daemon JVM heap size
# Start with 2GB or 4GB. Adjust based on your system RAM.
# Use 'g' for gigabytes, 'm' for megabytes.
org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8

# org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8